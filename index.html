<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="doc-title">Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <section class="sidebar">
        <section class="language" aria-label="Language selector">
          <label for="language-select" id="language-label">Language</label>
          <select id="language-select">
            <option value="en">English</option>
            <option value="fr">Français</option>
          </select>
        </section>
        <section class="settings" aria-label="Game settings">
          <label for="size-select" id="size-label">Size</label>
          <select id="size-select">
            <option value="12">12 x 12</option>
            <option value="16">16 x 16</option>
            <option value="20" selected>20 x 20</option>
            <option value="24">24 x 24</option>
            <option value="28">28 x 28</option>
          </select>
        </section>
        <section class="hud" aria-label="Game status">
          <p><span id="score-label">Score</span>: <span id="score">0</span></p>
          <p><span id="state-label">State</span>: <span id="status">Running</span></p>
        </section>
        <section class="controls" aria-label="Controls">
          <button id="restart" type="button">Restart</button>
          <button id="pause" type="button">Pause</button>
        </section>
        <section class="touch" aria-label="On-screen controls">
          <div></div>
          <button type="button" data-dir="up" id="dir-up">Up</button>
          <div></div>
          <button type="button" data-dir="left" id="dir-left">Left</button>
          <button type="button" data-dir="down" id="dir-down">Down</button>
          <button type="button" data-dir="right" id="dir-right">Right</button>
        </section>
        <p class="help" id="help-text">Use Arrow keys or WASD to move.</p>
        <p class="repo-link">
          <a
            href="https://github.com/chengkuanz/snake-grid-game"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub Repository
          </a>
        </p>
      </section>

      <section class="board-wrap">
        <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
      </section>
    </main>

    <script src="./snake.js"></script>
  </body>
</html>
