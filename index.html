<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <section class="hud" aria-label="Game status">
        <p>Score: <span id="score">0</span></p>
        <p>State: <span id="status">Running</span></p>
      </section>

      <section class="board-wrap">
        <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
      </section>

      <section class="controls" aria-label="Controls">
        <button id="restart" type="button">Restart</button>
        <button id="pause" type="button">Pause</button>
      </section>

      <section class="touch" aria-label="On-screen controls">
        <div></div>
        <button type="button" data-dir="up">Up</button>
        <div></div>
        <button type="button" data-dir="left">Left</button>
        <button type="button" data-dir="down">Down</button>
        <button type="button" data-dir="right">Right</button>
      </section>

      <p class="help">Use Arrow keys or WASD to move.</p>
    </main>

    <script src="./snake.js"></script>
  </body>
</html>
